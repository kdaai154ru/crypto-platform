# .github/workflows/infra-check.yml
name: Infrastructure Checks

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'

env:
  PNPM_VERSION: 10
  NODE_VERSION: 22

jobs:
  docker-validate:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:27-dind
        options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose -f infra/docker/docker-compose.yml config --quiet

      - name: Validate nginx.conf syntax
        run: |
          docker run --rm -v ${{ github.workspace }}/infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro nginx:1.27-alpine nginx -t

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run secret scan script if exists
        run: |
          if grep -q "secret-scan" package.json; then
            pnpm run secret-scan
          else
            echo "No secret-scan script found. Performing basic check..."
            ! grep -rn "password\|secret\|api_key" --include="*.ts" --include="*.js" src/ | grep -v "CHANGE_ME\|example\|placeholder"
          fi