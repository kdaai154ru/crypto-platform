# infra/docker/nginx/nginx.conf
# Reverse proxy for crypto-platform
# Routes: / -> frontend :3001 | /api -> orchestrator :3010 | /ws -> ws-gateway :4000

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream definitions ──────────────────────────────────────────────
    upstream frontend {
        server host.docker.internal:3001;
        keepalive 32;
    }

    upstream orchestrator {
        server host.docker.internal:3010;
        keepalive 16;
    }

    upstream ws_gateway {
        server host.docker.internal:4000;
        keepalive 64;
    }

    # ── Main server ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health probe endpoint — used by Docker healthcheck
        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # WebSocket upgrade — must be before /api and /
        location /ws {
            proxy_pass         http://ws_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # REST API — orchestrator
        location /api/ {
            proxy_pass         http://orchestrator/;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Frontend — Nuxt SSR
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
