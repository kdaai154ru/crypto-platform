# infra/nginx/nginx.conf
events { worker_connections 4096; }
http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_conn_zone $binary_remote_addr zone=ws:10m;

  upstream ws_backend   { server 127.0.0.1:4000; }
  upstream api_backend  { server 127.0.0.1:3001; }

  server {
    listen 80; return 301 https://$host$request_uri;
  }
  server {
    listen 443 ssl http2;
    ssl_protocols TLSv1.3;
    ssl_certificate     /etc/ssl/certs/cert.pem;
    ssl_certificate_key /etc/ssl/private/key.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /ws {
      proxy_pass http://ws_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      limit_conn ws 20;
    }
    location /api {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location / {
      root /srv/crypto-platform/apps/frontend/.output/public;
      try_files $uri $uri/ /index.html;
      expires 1h;
    }
  }
}
